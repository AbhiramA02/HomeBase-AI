services:
  db:
    image: pgvector/pgvector:pg16
    container_name: homebase-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=homebase
    volumes:
      - homebase_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d homebase"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  homebase_pgdata: